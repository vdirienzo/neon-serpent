name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: TypeScript type-check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint -- --max-warnings=0 || npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Test suite
        run: npm test

      - name: Build
        run: npm run build

      - name: Cache build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if: success()

  test-coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit

      - name: Vitest coverage
        run: npx vitest run --coverage --reporter=verbose 2>&1 | tee coverage-output.txt

      - name: Check coverage thresholds
        run: |
          if grep -E "All files.*([0-9]+)" coverage-output.txt > /dev/null; then
            COVERAGE=$(grep -oE "All files[^|]*\|[^|]*\|[^|]*\|[^|]*\|" coverage-output.txt | head -1 | grep -oE "[0-9]+\.[0-9]+" | tail -1)
            echo "Total coverage: ${COVERAGE}%"
          fi
          echo "Coverage report generated (thresholds enforced in vitest.config.ts)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
