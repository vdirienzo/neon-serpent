name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check Vercel secrets
    runs-on: ubuntu-latest
    outputs:
      has-token: ${{ steps.check.outputs.has-token }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has-token=true" >> $GITHUB_OUTPUT
          else
            echo "has-token=false" >> $GITHUB_OUTPUT
            echo "::warning::VERCEL_TOKEN not configured. Skipping Vercel deploy."
            echo "::warning::To enable auto-deploy, add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to repo secrets."
            echo "::warning::See https://vercel.com/account/tokens to create a token."
          fi

  deploy:
    name: Deploy to Vercel
    needs: check
    if: needs.check.outputs.has-token == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci --prefer-offline --no-audit

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build for Vercel
        run: npm run build:vercel

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel deploy --prebuilt --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
