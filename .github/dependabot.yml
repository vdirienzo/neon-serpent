version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'UTC'
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: 'chore'
      prefix-development: 'chore(dev)'
      include: 'scope'
    labels:
      - 'dependencies'
      - 'automated'
    groups:
      dev-dependencies:
        dependency-type: 'development'
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - '*'
    ignore:
      - dependency-name: 'three'
        versions: ['>=99.0.0']

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    labels:
      - 'ci'
      - 'automated'
    groups:
      actions:
        patterns:
          - '*'
